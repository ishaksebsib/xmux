name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  FORCE_COLOR: 1
  TURBO_TELEMETRY_DISABLED: 1

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI (linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm fmt:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm turbo run typecheck --output-logs=errors-only --log-order=grouped

      - name: Build
        run: pnpm turbo run build --output-logs=errors-only --log-order=grouped
