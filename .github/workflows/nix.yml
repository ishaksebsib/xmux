name: Nix

on:
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "apps/cli/**"
      - "apps/server/**"
      - "packages/**"
      - ".github/workflows/nix.yml"
  push:
    branches:
      - main
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "apps/cli/**"
      - "apps/server/**"
      - "packages/**"
      - ".github/workflows/nix.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  plan:
    name: Plan Nix CI scope
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      systems: ${{ steps.scope.outputs.systems }}
      matrix: ${{ steps.scope.outputs.matrix }}

    steps:
      - name: Select systems
        id: scope
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo 'systems=x86_64-linux' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[{"system":"x86_64-linux","runner":"ubuntu-24.04"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'systems=x86_64-linux aarch64-linux aarch64-darwin' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[{"system":"x86_64-linux","runner":"ubuntu-24.04"},{"system":"aarch64-linux","runner":"ubuntu-24.04-arm"},{"system":"aarch64-darwin","runner":"macos-14"}]}' >> "$GITHUB_OUTPUT"
          fi

  eval:
    name: Evaluate flake outputs
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Evaluate flake outputs
        run: |
          set -euo pipefail

          nix --version
          nix flake metadata

          systems="${{ needs.plan.outputs.systems }}"
          packages="cli xmux default cli-deps-updater"
          checks="cli default"

          for system in $systems; do
            echo "=== packages.${system} ==="
            for package in $packages; do
              nix eval ".#packages.${system}.${package}.drvPath" --raw >/dev/null
              echo "  ${package}: ok"
            done

            echo "=== checks.${system} ==="
            for check in $checks; do
              nix eval ".#checks.${system}.${check}.drvPath" --raw >/dev/null
              echo "  ${check}: ok"
            done

            echo "=== apps.${system} ==="
            nix eval ".#apps.${system}.default.program" --raw >/dev/null
            nix eval ".#apps.${system}.cli.program" --raw >/dev/null
            nix eval ".#apps.${system}.xmux.program" --raw >/dev/null

            echo "=== devShells.${system} ==="
            nix eval ".#devShells.${system}.default.drvPath" --raw >/dev/null
          done

  build:
    name: Build CLI (${{ matrix.system }})
    needs:
      - plan
      - eval
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Build package
        env:
          SYSTEM: ${{ matrix.system }}
        run: |
          set -euo pipefail

          build_log="$(mktemp)"
          trap 'rm -f "$build_log"' EXIT

          set +e
          nix build ".#packages.${SYSTEM}.cli" --out-link result 2>&1 | tee "$build_log"
          status="${PIPESTATUS[0]}"
          set -e

          if [ "$status" -ne 0 ]; then
            got_hash="$(grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' "$build_log" | awk '{ print $2 }' | tail -n1 || true)"
            if [ -n "$got_hash" ]; then
              echo "::error title=Stale Nix pnpm dependency hash::Update nix/hashes.json: .pnpmDeps = ${got_hash}"
              echo "### Stale Nix pnpm dependency hash" >> "$GITHUB_STEP_SUMMARY"
              echo "Update \`nix/hashes.json\`:" >> "$GITHUB_STEP_SUMMARY"
              echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
              echo "\"pnpmDeps\": \"${got_hash}\"" >> "$GITHUB_STEP_SUMMARY"
              echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            fi
            exit "$status"
          fi

          ./result/bin/xmux --version

          if [ "$SYSTEM" = "x86_64-linux" ]; then
            nix run . -- --version
          fi
